  identity-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9011"]
    environment:
      - MODULE_PATH=/app/identity-management-testing/identity-management.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9011"
  fileupload-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9012"]
    environment:
      - MODULE_PATH=/app/file-upload-testing/file_upload.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9012"
  
  api-testing-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9013"]
    environment:
      - MODULE_PATH=/app/api-testing/api_testing.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9013"

  katana-mcp:
    build:
      context: ./katana-crawler
      dockerfile: Dockerfile
    container_name: rajdoll-katana-mcp-1
    expose:
      - "9015"
    environment:
      - LOG_LEVEL=INFO

  juice-shop:
    image: bkimminich/juice-shop:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
