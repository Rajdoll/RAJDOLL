      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9004"
  input-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9005"]
    environment:
      - MODULE_PATH=/app/input-validation-testing/input-validation.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9005"
  error-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9006"]
    environment:
      - MODULE_PATH=/app/error-handling-testing/error-handling.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9006"
  crypto-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9007"]
    environment:
      - MODULE_PATH=/app/testing-for-weak-cryptography/weak-cryptography.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9007"
  client-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9008"]
    environment:
      - MODULE_PATH=/app/client-side-testing/client-side.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9008"
  biz-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9009"]
    environment:
      - MODULE_PATH=/app/business-logic-testing/business-logic.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
      - "9009"
  confdep-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp-tools
    command: ["uvicorn", "mcp_adapter.server:app", "--host", "0.0.0.0", "--port", "9010"]
    environment:
      - MODULE_PATH=/app/configuration-and-deployment-testing/configuration-and-deployment.py
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADAPTIVE_MODE=${ADAPTIVE_MODE:-off}
    expose:
